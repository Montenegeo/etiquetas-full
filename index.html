<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas FULL · Montenegro</title>
<script src="https://unpkg.com/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<style>
/* ── PRINT ──────────────────────────────────────────────────────────────── */
@media print {
  @page { size: 80mm 25mm; margin: 0; }
  body > *:not(#print-area) { display: none !important; }
  #print-area { display: block !important; }
  .strip { width: 80mm; height: 25mm; display: flex; page-break-after: always; break-after: page; overflow: hidden; }
  .cell { width: 40mm; height: 25mm; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cell img { max-width: 38mm; max-height: 23mm; object-fit: contain; }
}

/* ── SCREEN ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0f172a; --surface:#1e293b; --border:#334155; --blue:#2563eb; --text:#e2e8f0; --muted:#94a3b8; }

body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 44px 20px 80px;
}

.logo { width:46px;height:46px;background:var(--blue);border-radius:12px;display:grid;place-items:center;font-weight:900;font-size:21px;color:#fff;margin-bottom:14px; }
h1 { font-size:21px;font-weight:700;margin-bottom:4px; }
.sub { font-size:13px;color:var(--muted);margin-bottom:36px; }

/* Upload box */
.upload-box {
  width:100%;max-width:500px;
  background:var(--surface);border:2px dashed var(--border);border-radius:14px;
  padding:40px 28px;text-align:center;
  transition:border-color .2s;
}
.upload-box.dragover { border-color:#3b82f6;background:rgba(37,99,235,.07); }
.upload-box svg { display:block;margin:0 auto 16px;opacity:.4; }
.upload-box p { font-size:14px;color:var(--muted);margin-bottom:20px; }

/* File button — VISIBLE input styled as button */
.file-btn-wrap { position:relative;display:inline-block; }
.file-btn-wrap input[type=file] {
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.file-btn {
  display:inline-flex;align-items:center;gap:8px;
  background:var(--blue);color:#fff;
  padding:11px 24px;border-radius:8px;font-size:15px;font-weight:600;
  cursor:pointer;border:none;pointer-events:none;
}

/* Card */
.card { width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-top:18px; }

/* Progress */
.prog-wrap { background:var(--bg);border-radius:6px;height:5px;overflow:hidden;margin-bottom:6px; }
.prog-bar  { height:100%;background:var(--blue);width:0%;border-radius:6px;transition:width .12s; }
.prog-msg  { font-size:12px;color:var(--muted);min-height:16px;margin-bottom:14px; }

/* Buttons */
.btn { display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:background .15s;margin-bottom:10px; }
.btn:disabled { opacity:.38;cursor:not-allowed; }
.btn-blue  { background:var(--blue);color:#fff; }
.btn-blue:hover:not(:disabled)  { background:#1d4ed8; }
.btn-green { background:#16a34a;color:#fff; }
.btn-green:hover:not(:disabled) { background:#15803d; }
.btn-ghost { background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;padding:8px; }

/* Alerts */
.alert { border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px; }
.alert-ok  { background:rgba(22,163,74,.1);border:1px solid rgba(34,197,94,.22);color:#86efac; }
.alert-err { background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5; }

/* Preview */
.preview-grid { display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:12px; }
.prev-strip { border:1px solid var(--border);border-radius:5px;overflow:hidden;background:#fff;display:flex;aspect-ratio:80/25; }
.prev-cell  { flex:1;display:flex;align-items:center;justify-content:center;padding:2px; }
.prev-cell img { max-width:100%;max-height:100%;object-fit:contain; }
.prev-n { font-size:10px;color:var(--muted);text-align:center;margin-top:2px; }

#print-area { display:none; }
footer { margin-top:44px;font-size:11px;color:#475569;text-align:center; }
</style>
</head>
<body>

<div class="logo">M</div>
<h1>Etiquetas FULL</h1>
<p class="sub">Shopee FULL · Impressão direta · duplas 40×25mm</p>

<!-- UPLOAD -->
<div class="upload-box" id="drop-zone">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.3">
    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="12" y1="18" x2="12" y2="12"/>
    <polyline points="9 15 12 12 15 15"/>
  </svg>
  <p>Arraste o PDF aqui ou clique no botão abaixo</p>
  <div class="file-btn-wrap">
    <input type="file" id="file-input" accept="application/pdf,.pdf" onchange="onFileChange(event)">
    <div class="file-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Selecionar PDF
    </div>
  </div>
</div>

<!-- STATUS -->
<div class="card" id="card-status" style="display:none">
  <div style="font-size:14px;font-weight:600;margin-bottom:4px" id="fn">—</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px" id="fm">—</div>

  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="prog-msg" id="prog-msg"></div>

  <div id="alert-box" style="display:none"></div>

  <button class="btn btn-blue" id="btn-proc" onclick="processPDF()" disabled>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Identificar etiquetas
  </button>

  <button class="btn btn-green" id="btn-print" onclick="window.print()" disabled>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Imprimir na térmica
  </button>

  <button class="btn btn-ghost" onclick="resetAll()">Novo arquivo</button>

  <div id="preview-wrap" style="display:none">
    <div style="font-size:12px;color:var(--muted);margin-top:16px;margin-bottom:8px;text-align:center" id="preview-title"></div>
    <div class="preview-grid" id="preview-grid"></div>
  </div>
</div>

<div id="print-area"></div>

<footer>Processamento local · nenhum dado enviado para servidores · Montenegro Indústria</footer>

<script>
// ── PDF.js setup ───────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://unpkg.com/pdfjs-dist@2.16.105/build/pdf.worker.min.js';
  }
});

const CFG = { cols:4, rows:6, marginV:4, marginH:3, dpi:200 };
let pdfDoc = null, labelImages = [];

// ── Drag & drop ────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f); else showAlert('Nenhum arquivo detectado.', 'err');
});

// ── File input ─────────────────────────────────────────────────────────────
function onFileChange(e) {
  const f = e.target.files[0];
  if (f) handleFile(f);
}

// ── Load ───────────────────────────────────────────────────────────────────
async function handleFile(file) {
  resetAll(false);
  try {
    if (typeof pdfjsLib === 'undefined')
      throw new Error('PDF.js não carregou. Verifique sua conexão e recarregue.');

    const buf = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;

    document.getElementById('fn').textContent = file.name;
    document.getElementById('fm').textContent =
      `${pdfDoc.numPages} página(s)  ·  até ${pdfDoc.numPages * CFG.cols * CFG.rows} etiquetas`;
    document.getElementById('card-status').style.display = '';
    document.getElementById('btn-proc').disabled = false;
    setMsg('Pronto. Clique em "Identificar etiquetas".');
  } catch(e) {
    showAlert('Erro: ' + e.message, 'err');
    document.getElementById('card-status').style.display = '';
    console.error(e);
  }
}

// ── Process ────────────────────────────────────────────────────────────────
async function processPDF() {
  if (!pdfDoc) return;
  document.getElementById('btn-proc').disabled = true;
  labelImages = [];

  try {
    const pxPerMm = CFG.dpi / 25.4;
    const total   = pdfDoc.numPages;

    for (let n = 1; n <= total; n++) {
      setProgress((n-1)/total * 90, `Processando página ${n} de ${total}…`);
      const page = await pdfDoc.getPage(n);
      const vp   = page.getViewport({ scale: CFG.dpi / 72 });

      const pc = document.createElement('canvas');
      pc.width = vp.width; pc.height = vp.height;
      const px = pc.getContext('2d');
      px.fillStyle = '#fff'; px.fillRect(0, 0, pc.width, pc.height);
      await page.render({ canvasContext: px, viewport: vp }).promise;

      const mH = CFG.marginH * pxPerMm, mV = CFG.marginV * pxPerMm;
      const cW = (pc.width  - 2*mH) / CFG.cols;
      const cH = (pc.height - 2*mV) / CFG.rows;

      for (let r = 0; r < CFG.rows; r++) {
        for (let c = 0; c < CFG.cols; c++) {
          const lc = document.createElement('canvas');
          lc.width = Math.round(cW); lc.height = Math.round(cH);
          const lx = lc.getContext('2d');
          lx.fillStyle = '#fff'; lx.fillRect(0, 0, lc.width, lc.height);
          lx.drawImage(pc, mH+c*cW, mV+r*cH, cW, cH, 0, 0, lc.width, lc.height);
          if (!isBlank(lc)) labelImages.push(lc.toDataURL('image/jpeg', 0.93));
        }
      }
    }

    setProgress(100, '');
    buildPrintArea();
    buildPreview();

    const nStrips = Math.ceil(labelImages.length / 2);
    showAlert(`✅ ${labelImages.length} etiquetas → ${nStrips} tiras duplas. Clique em "Imprimir".`, 'ok');
    document.getElementById('btn-print').disabled = false;

  } catch(e) {
    showAlert('Erro ao processar: ' + e.message, 'err');
    console.error(e);
    document.getElementById('btn-proc').disabled = false;
  }
}

// ── Build print area ───────────────────────────────────────────────────────
function buildPrintArea() {
  const area = document.getElementById('print-area');
  area.innerHTML = '';
  for (let i = 0; i < labelImages.length; i += 2) {
    const strip = document.createElement('div');
    strip.className = 'strip';
    [0, 1].forEach(offset => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (labelImages[i + offset]) {
        const img = document.createElement('img');
        img.src = labelImages[i + offset];
        cell.appendChild(img);
      }
      strip.appendChild(cell);
    });
    area.appendChild(strip);
  }
}

// ── Preview ────────────────────────────────────────────────────────────────
function buildPreview() {
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';
  for (let i = 0; i < labelImages.length; i += 2) {
    const wrap = document.createElement('div');
    const strip = document.createElement('div');
    strip.className = 'prev-strip';
    [0, 1].forEach(offset => {
      const cell = document.createElement('div');
      cell.className = 'prev-cell';
      if (labelImages[i + offset]) {
        const img = document.createElement('img'); img.src = labelImages[i + offset];
        cell.appendChild(img);
      }
      strip.appendChild(cell);
    });
    const n = document.createElement('div');
    n.className = 'prev-n';
    n.textContent = `Tira ${Math.floor(i/2)+1}`;
    wrap.appendChild(strip); wrap.appendChild(n);
    grid.appendChild(wrap);
  }
  document.getElementById('preview-title').textContent =
    `${Math.ceil(labelImages.length/2)} tiras · cada tira = 1 impressão de 80×25mm`;
  document.getElementById('preview-wrap').style.display = '';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function isBlank(c) {
  const d = c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  let dark = 0;
  for (let i=0;i<d.length;i+=4) if((d[i]+d[i+1]+d[i+2])/3<200) dark++;
  return dark/(c.width*c.height) < 0.004;
}
function setProgress(pct, msg) {
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-msg').textContent = msg;
}
function setMsg(m) { document.getElementById('prog-msg').textContent = m; }
function showAlert(msg, type) {
  const el = document.getElementById('alert-box');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = '';
}
function resetAll(full=true) {
  if (full) {
    pdfDoc = null;
    document.getElementById('file-input').value = '';
    document.getElementById('card-status').style.display = 'none';
  }
  labelImages = [];
  document.getElementById('btn-proc').disabled  = true;
  document.getElementById('btn-print').disabled = true;
  document.getElementById('alert-box').style.display  = 'none';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-msg').textContent = '';
  document.getElementById('print-area').innerHTML = '';
  document.getElementById('preview-grid').innerHTML = '';
}
</script>
</body>
</html>
