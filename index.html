<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas FULL · Montenegro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* ── PRINT STYLES (o que a impressora vê) ──────────────────────────────── */
@media print {
  @page {
    size: 80mm 25mm;
    margin: 0;
  }
  body > *:not(#print-area) { display: none !important; }
  #print-area {
    display: block !important;
    visibility: visible !important;
  }
  .strip {
    width: 80mm;
    height: 25mm;
    display: flex;
    page-break-after: always;
    break-after: page;
    overflow: hidden;
  }
  .cell {
    width: 40mm;
    height: 25mm;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .cell img {
    max-width: 38mm;
    max-height: 23mm;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }
  .cell-empty { background: #fff; }
}

/* ── SCREEN STYLES ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --blue: #2563eb; --blue-h: #1d4ed8; --text: #e2e8f0; --muted: #94a3b8;
}

body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 44px 20px 64px;
}

.logo {
  width: 46px; height: 46px; background: var(--blue); border-radius: 12px;
  display: grid; place-items: center; font-weight: 900; font-size: 21px;
  color: #fff; margin-bottom: 14px; flex-shrink: 0;
}
h1 { font-size: 21px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }

/* Upload */
#drop-zone {
  width: 100%; max-width: 500px;
  border: 2px dashed var(--border); border-radius: 14px;
  padding: 52px 28px; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s; background: var(--surface);
}
#drop-zone.over, #drop-zone:hover { border-color: #3b82f6; background: rgba(37,99,235,.07); }
#drop-zone svg { display: block; margin: 0 auto 14px; opacity: .45; }
#drop-zone .cta { font-size: 16px; font-weight: 600; color: #3b82f6; }
#drop-zone .hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
#file-input { display: none; }

/* Status */
#status {
  display: none; width: 100%; max-width: 500px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; margin-top: 18px;
}
.frow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.ficon { width: 34px; height: 34px; background: rgba(37,99,235,.15); border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
.fname { font-size: 14px; font-weight: 600; }
.fmeta { font-size: 12px; color: var(--muted); margin-top: 2px; }

#prog-wrap { background: var(--bg); border-radius: 6px; height: 5px; overflow: hidden; margin-bottom: 6px; }
#prog-bar { height: 100%; background: var(--blue); width: 0%; border-radius: 6px; transition: width .12s; }
#prog-msg { font-size: 12px; color: var(--muted); min-height: 16px; margin-bottom: 16px; }

/* Buttons */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px 20px; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer; border: none;
  transition: background .15s; margin-bottom: 10px;
}
.btn:disabled { opacity: .38; cursor: not-allowed; }
.btn-blue   { background: var(--blue); color: #fff; }
.btn-blue:hover:not(:disabled) { background: var(--blue-h); }
.btn-print  { background: #16a34a; color: #fff; }
.btn-print:hover:not(:disabled) { background: #15803d; }
.btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 13px; padding: 8px 16px; }
.btn-ghost:hover { border-color: #3b82f6; color: #3b82f6; }

/* Result info */
#result-info {
  display: none; margin-bottom: 14px;
  background: rgba(22,163,74,.1); border: 1px solid rgba(34,197,94,.22);
  border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #86efac;
}

/* Preview grid (screen only) */
#preview-wrap { display: none; width: 100%; max-width: 500px; margin-top: 22px; }
#preview-wrap h2 { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 10px; }
#preview-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
}
.prev-strip {
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  background: #fff; display: flex; aspect-ratio: 80 / 25;
}
.prev-cell {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 2px;
}
.prev-cell img { max-width: 100%; max-height: 100%; object-fit: contain; }
.prev-cell.empty { background: #f9f9f9; }
.strip-n { font-size: 10px; color: var(--muted); text-align: center; padding: 2px 0; }

/* Print area (hidden on screen, shown when printing) */
#print-area { display: none; }

footer { margin-top: 44px; font-size: 11px; color: #475569; text-align: center; }
</style>
</head>
<body>

<div class="logo">M</div>
<h1>Etiquetas FULL</h1>
<p class="sub">Shopee FULL · Imprimir direto na térmica · duplas 40×25mm</p>

<!-- UPLOAD -->
<label id="drop-zone" for="file-input">
  <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.3">
    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="12" y1="18" x2="12" y2="12"/>
    <polyline points="9 15 12 12 15 15"/>
  </svg>
  <div class="cta">Arraste o PDF aqui ou clique para selecionar</div>
  <div class="hint">Print_Barcode do Shopee FULL (A4, grade 4 × 6 etiquetas)</div>
</label>
<input type="file" id="file-input" accept=".pdf" style="display:none">

<!-- STATUS / CONTROLES -->
<div id="status">
  <div class="frow">
    <div class="ficon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <div>
      <div class="fname" id="fn">—</div>
      <div class="fmeta" id="fm">—</div>
    </div>
  </div>

  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="prog-msg"></div>

  <div id="result-info"></div>

  <button class="btn btn-blue" id="btn-proc" onclick="processPDF()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
    </svg>
    Identificar etiquetas
  </button>

  <button class="btn btn-print" id="btn-print" onclick="printLabels()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Imprimir na térmica
  </button>

  <button class="btn btn-ghost" onclick="resetAll()">Novo arquivo</button>
</div>

<!-- PREVIEW (tela) -->
<div id="preview-wrap">
  <h2 id="preview-title">—</h2>
  <div id="preview-grid"></div>
</div>

<!-- ÁREA DE IMPRESSÃO (invisível na tela, usada pelo browser ao imprimir) -->
<div id="print-area"></div>

<footer>Processamento local · nenhum dado enviado para servidores · Montenegro Indústria</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Config hardcoded para Print_Barcode FULL ───────────────────────────────
const CFG = {
  cols:    4,    // colunas de etiquetas no A4
  rows:    6,    // linhas de etiquetas no A4
  marginV: 4,    // mm margem topo/base
  marginH: 3,    // mm margem esq/dir
  dpi:     200,
};

let pdfDoc = null;
let labelImages = [];   // todas as etiquetas extraídas (dataURL)

// ── Drag & drop ────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); e.stopPropagation(); dz.classList.add('over'); });
dz.addEventListener('dragleave', e => { e.stopPropagation(); dz.classList.remove('over'); });
dz.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation(); dz.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type === 'application/pdf') loadPDF(f);
  else alert('Selecione um arquivo PDF.');
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// ── Carregar PDF ───────────────────────────────────────────────────────────
async function loadPDF(file) {
  resetAll(false);
  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument(buf).promise;

  document.getElementById('fn').textContent = file.name;
  document.getElementById('fm').textContent =
    `${pdfDoc.numPages} página(s) · estimativa: até ${pdfDoc.numPages * CFG.cols * CFG.rows} etiquetas`;
  document.getElementById('status').style.display = '';
  document.getElementById('btn-proc').disabled = false;
  setMsg('Arquivo carregado. Clique em "Identificar etiquetas".');
}

// ── Processar: extrair etiquetas da grade 4×6 ─────────────────────────────
async function processPDF() {
  if (!pdfDoc) return;
  document.getElementById('btn-proc').disabled = true;
  labelImages = [];

  const pxPerMm = CFG.dpi / 25.4;
  const total   = pdfDoc.numPages;

  for (let n = 1; n <= total; n++) {
    setProgress((n - 1) / total * 95, `Lendo página ${n} de ${total}…`);

    const page = await pdfDoc.getPage(n);
    const vp   = page.getViewport({ scale: CFG.dpi / 72 });

    const pc = document.createElement('canvas');
    pc.width = vp.width; pc.height = vp.height;
    const px = pc.getContext('2d');
    px.fillStyle = '#ffffff';
    px.fillRect(0, 0, pc.width, pc.height);
    await page.render({ canvasContext: px, viewport: vp }).promise;

    const mH = CFG.marginH * pxPerMm;
    const mV = CFG.marginV * pxPerMm;
    const aW = pc.width  - 2 * mH;
    const aH = pc.height - 2 * mV;
    const cW = aW / CFG.cols;
    const cH = aH / CFG.rows;

    for (let r = 0; r < CFG.rows; r++) {
      for (let c = 0; c < CFG.cols; c++) {
        const lc = document.createElement('canvas');
        lc.width  = Math.round(cW);
        lc.height = Math.round(cH);
        const lx  = lc.getContext('2d');
        lx.fillStyle = '#ffffff';
        lx.fillRect(0, 0, lc.width, lc.height);
        lx.drawImage(pc, mH + c * cW, mV + r * cH, cW, cH, 0, 0, lc.width, lc.height);
        if (!isBlank(lc)) labelImages.push(lc.toDataURL('image/jpeg', 0.93));
      }
    }
  }

  setProgress(100, '');
  buildPrintArea();
  buildPreview();

  const nStrips = Math.ceil(labelImages.length / 2);
  document.getElementById('result-info').style.display = '';
  document.getElementById('result-info').innerHTML =
    `✅ <strong>${labelImages.length} etiquetas</strong> identificadas → <strong>${nStrips} tiras duplas</strong> · Clique em "Imprimir na térmica"`;
  document.getElementById('btn-print').disabled = false;
}

// ── Montar área de impressão: cada strip = 1 página de 80×25mm ────────────
function buildPrintArea() {
  const area = document.getElementById('print-area');
  area.innerHTML = '';

  for (let i = 0; i < labelImages.length; i += 2) {
    const strip = document.createElement('div');
    strip.className = 'strip';

    // Célula esquerda
    const cellL = document.createElement('div');
    cellL.className = 'cell';
    const imgL = document.createElement('img');
    imgL.src = labelImages[i];
    cellL.appendChild(imgL);
    strip.appendChild(cellL);

    // Célula direita (pode ser vazia na última tira ímpar)
    const cellR = document.createElement('div');
    if (i + 1 < labelImages.length) {
      cellR.className = 'cell';
      const imgR = document.createElement('img');
      imgR.src = labelImages[i + 1];
      cellR.appendChild(imgR);
    } else {
      cellR.className = 'cell cell-empty';
    }
    strip.appendChild(cellR);

    area.appendChild(strip);
  }
}

// ── Preview na tela ────────────────────────────────────────────────────────
function buildPreview() {
  const grid  = document.getElementById('preview-grid');
  const nStrips = Math.ceil(labelImages.length / 2);
  grid.innerHTML = '';
  document.getElementById('preview-title').textContent =
    `Pré-visualização · ${nStrips} tiras duplas (cada tira = 1 impressão 80×25mm)`;

  for (let i = 0; i < labelImages.length; i += 2) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;';

    const strip = document.createElement('div');
    strip.className = 'prev-strip';

    const cellL = document.createElement('div');
    cellL.className = 'prev-cell';
    const imgL = document.createElement('img'); imgL.src = labelImages[i];
    cellL.appendChild(imgL);
    strip.appendChild(cellL);

    const cellR = document.createElement('div');
    if (i + 1 < labelImages.length) {
      cellR.className = 'prev-cell';
      const imgR = document.createElement('img'); imgR.src = labelImages[i + 1];
      cellR.appendChild(imgR);
    } else {
      cellR.className = 'prev-cell empty';
    }
    strip.appendChild(cellR);

    const n = document.createElement('div');
    n.className = 'strip-n';
    n.textContent = `Tira ${Math.floor(i/2) + 1}`;

    wrap.appendChild(strip);
    wrap.appendChild(n);
    grid.appendChild(wrap);
  }

  document.getElementById('preview-wrap').style.display = '';
}

// ── Imprimir ───────────────────────────────────────────────────────────────
function printLabels() {
  if (!labelImages.length) return;
  window.print();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function isBlank(canvas) {
  const d = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
  let dark = 0;
  for (let i = 0; i < d.length; i += 4)
    if ((d[i] + d[i+1] + d[i+2]) / 3 < 200) dark++;
  return dark / (canvas.width * canvas.height) < 0.004;
}
function setProgress(pct, msg) {
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-msg').textContent = msg;
}
function setMsg(msg) { document.getElementById('prog-msg').textContent = msg; }

function resetAll(full = true) {
  if (full) {
    pdfDoc = null;
    document.getElementById('file-input').value = '';
    document.getElementById('status').style.display       = 'none';
    document.getElementById('preview-wrap').style.display = 'none';
  }
  labelImages = [];
  document.getElementById('btn-proc').disabled  = true;
  document.getElementById('btn-print').disabled = true;
  document.getElementById('result-info').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-msg').textContent = '';
  document.getElementById('print-area').innerHTML = '';
  document.getElementById('preview-grid').innerHTML = '';
}
</script>
</body>
</html>
