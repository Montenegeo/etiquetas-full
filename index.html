<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas FULL · Montenegro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --blue: #2563eb; --blue-h: #1d4ed8; --text: #e2e8f0; --muted: #94a3b8;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 48px 20px;
}

.logo {
  width: 48px; height: 48px; background: var(--blue); border-radius: 12px;
  display: grid; place-items: center; font-weight: 900; font-size: 22px;
  color: #fff; margin-bottom: 16px;
}
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.sub { font-size: 14px; color: var(--muted); margin-bottom: 40px; }

/* Drop zone */
#drop-zone {
  width: 100%; max-width: 520px;
  border: 2px dashed var(--border); border-radius: 14px;
  padding: 56px 32px; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--surface);
}
#drop-zone.over, #drop-zone:hover {
  border-color: #3b82f6; background: rgba(37,99,235,.07);
}
#drop-zone svg { display: block; margin: 0 auto 16px; opacity: .45; }
#drop-zone .cta { font-size: 16px; font-weight: 600; color: #3b82f6; }
#drop-zone .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }
#file-input { display: none; }

/* Status card */
#status-card {
  display: none; width: 100%; max-width: 520px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 28px 24px; margin-top: 20px;
}
.file-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.file-icon { width: 36px; height: 36px; background: rgba(37,99,235,.15); border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
.file-name { font-size: 14px; font-weight: 600; }
.file-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Progress */
#prog-wrap { background: var(--bg); border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 8px; }
#prog-bar { height: 100%; background: var(--blue); border-radius: 6px; width: 0%; transition: width .15s; }
#prog-msg { font-size: 12px; color: var(--muted); min-height: 18px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600;
  cursor: pointer; border: none; transition: background .15s; width: 100%;
  justify-content: center; margin-top: 14px;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover:not(:disabled) { background: var(--blue-h); }
.btn-green { background: #16a34a; color: #fff; }
.btn-green:hover:not(:disabled) { background: #15803d; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 13px; padding: 8px 16px; margin-top: 10px; }
.btn-ghost:hover { border-color: #3b82f6; color: #3b82f6; }

/* Result */
#result-box {
  display: none; margin-top: 14px;
  background: rgba(22,163,74,.1); border: 1px solid rgba(34,197,94,.25);
  border-radius: 8px; padding: 12px 16px;
  font-size: 13px; color: #86efac; line-height: 1.5;
}

/* Preview strip */
#preview-strip {
  display: none; width: 100%; max-width: 520px; margin-top: 20px;
}
#preview-strip .strip-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-align: center; }
#strip-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px;
}
.strip-item { border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
.strip-item img { display: block; width: 100%; height: auto; }
.strip-item .n { font-size: 10px; color: var(--muted); text-align: center; padding: 2px; }

footer { margin-top: 48px; font-size: 12px; color: #475569; text-align: center; }
</style>
</head>
<body>

<div class="logo">M</div>
<h1>Etiquetas FULL</h1>
<p class="sub">Shopee FULL · A4 → Térmicas duplas 40×25mm</p>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.3">
    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="12" y1="18" x2="12" y2="12"/>
    <polyline points="9 15 12 12 15 15"/>
  </svg>
  <div class="cta">Arraste o PDF aqui ou clique para selecionar</div>
  <div class="hint">Arquivo Print_Barcode do Shopee FULL (A4, grade 4×6)</div>
</div>
<input type="file" id="file-input" accept=".pdf">

<div id="status-card">
  <div class="file-row">
    <div class="file-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <div>
      <div class="file-name" id="fn">—</div>
      <div class="file-meta" id="fm">—</div>
    </div>
  </div>

  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="prog-msg"></div>

  <button class="btn btn-blue" id="btn-convert" onclick="convert()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
    </svg>
    Converter para térmica
  </button>

  <button class="btn btn-green" id="btn-dl" onclick="download()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Baixar PDF térmico
  </button>

  <div id="result-box"></div>

  <button class="btn btn-ghost" onclick="reset()">Novo arquivo</button>
</div>

<div id="preview-strip">
  <div class="strip-title" id="strip-title">—</div>
  <div id="strip-grid"></div>
</div>

<footer>Processamento local · nenhum arquivo enviado para servidores · Montenegro Indústria</footer>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Hardcoded config for Shopee FULL Print_Barcode A4 ──────────────────────
const CFG = {
  cols:    4,      // 4 colunas de etiquetas no A4
  rows:    6,      // 6 linhas por página (última página pode ter menos)
  marginV: 4,      // mm topo/base
  marginH: 3,      // mm esq/dir
  dpi:     200,    // resolução de extração
  outW:    80,     // mm largura da tira (dupla)
  outH:    25,     // mm altura
};

let pdfDoc = null, resultDoc = null, previewImages = [];

// ── Drag & drop ────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type === 'application/pdf') load(f);
  else alert('Por favor selecione um arquivo PDF.');
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) load(e.target.files[0]);
});

// ── Load PDF ───────────────────────────────────────────────────────────────
async function load(file) {
  reset(false);
  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument(buf).promise;

  document.getElementById('fn').textContent = file.name;
  document.getElementById('fm').textContent =
    `${pdfDoc.numPages} página(s) · até ${pdfDoc.numPages * CFG.cols * CFG.rows} etiquetas`;
  document.getElementById('status-card').style.display = '';
  document.getElementById('btn-convert').disabled = false;
  setMsg('Pronto para converter.');
}

// ── Convert ────────────────────────────────────────────────────────────────
async function convert() {
  if (!pdfDoc) return;
  document.getElementById('btn-convert').disabled = true;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [CFG.outW, CFG.outH], compress: true });

  const pxPerMm = CFG.dpi / 25.4;
  const total   = pdfDoc.numPages;
  let   strips  = [];   // all individual label dataURLs

  // ── 1. Extract individual labels from every page ─────────────────────────
  for (let n = 1; n <= total; n++) {
    setProgress((n - 1) / total * 60, `Lendo página ${n} de ${total}…`);

    const page = await pdfDoc.getPage(n);
    const vp   = page.getViewport({ scale: CFG.dpi / 72 });

    const pc = document.createElement('canvas');
    pc.width = vp.width; pc.height = vp.height;
    const px = pc.getContext('2d');
    px.fillStyle = '#ffffff';
    px.fillRect(0, 0, pc.width, pc.height);
    await page.render({ canvasContext: px, viewport: vp }).promise;

    const mH   = CFG.marginH * pxPerMm;
    const mV   = CFG.marginV * pxPerMm;
    const aW   = pc.width  - 2 * mH;
    const aH   = pc.height - 2 * mV;
    const cW   = aW / CFG.cols;
    const cH   = aH / CFG.rows;

    for (let r = 0; r < CFG.rows; r++) {
      for (let c = 0; c < CFG.cols; c++) {
        const lc = document.createElement('canvas');
        lc.width  = Math.round(cW);
        lc.height = Math.round(cH);
        const lx  = lc.getContext('2d');
        lx.fillStyle = '#ffffff';
        lx.fillRect(0, 0, lc.width, lc.height);
        lx.drawImage(pc, mH + c * cW, mV + r * cH, cW, cH, 0, 0, lc.width, lc.height);

        if (!isBlank(lc)) strips.push(lc.toDataURL('image/jpeg', 0.92));
      }
    }
  }

  // ── 2. Pair labels into duplas (side by side on 80×25mm) ─────────────────
  setProgress(70, `Montando ${strips.length} etiquetas em duplas…`);

  previewImages = [];
  let firstPage = true;

  // output canvas dimensions at CFG.dpi
  const outWpx = Math.round(CFG.outW * pxPerMm);
  const outHpx = Math.round(CFG.outH * pxPerMm);
  const halfW  = Math.round(outWpx / 2);

  for (let i = 0; i < strips.length; i += 2) {
    const dc = document.createElement('canvas');
    dc.width  = outWpx; dc.height = outHpx;
    const dx  = dc.getContext('2d');
    dx.fillStyle = '#ffffff';
    dx.fillRect(0, 0, outWpx, outHpx);

    await drawImg(dx, strips[i],     0,     0, halfW, outHpx);
    if (i + 1 < strips.length)
      await drawImg(dx, strips[i+1], halfW, 0, halfW, outHpx);

    // thin divider line between the two labels
    dx.strokeStyle = '#cccccc';
    dx.lineWidth   = 1;
    dx.beginPath();
    dx.moveTo(halfW, 0);
    dx.lineTo(halfW, outHpx);
    dx.stroke();

    const dataUrl = dc.toDataURL('image/jpeg', 0.93);
    if (!firstPage) doc.addPage([CFG.outW, CFG.outH], 'landscape');
    firstPage = false;
    doc.addImage(dataUrl, 'JPEG', 0, 0, CFG.outW, CFG.outH, '', 'FAST');
    previewImages.push(dataUrl);
  }

  setProgress(100, '');
  resultDoc = doc;

  const nStrips = previewImages.length;
  document.getElementById('result-box').style.display = '';
  document.getElementById('result-box').innerHTML =
    `✅ <strong>${strips.length} etiquetas</strong> → <strong>${nStrips} tiras duplas</strong> de 80×25mm · Pronto para imprimir na ELGIN.`;
  document.getElementById('btn-dl').disabled = false;

  renderPreview(nStrips);
}

// ── Draw image (async helper) ──────────────────────────────────────────────
function drawImg(ctx, src, x, y, w, h) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, x, y, w, h); res(); };
    img.src = src;
  });
}

// ── Blank detection ────────────────────────────────────────────────────────
function isBlank(canvas) {
  const d = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
  let dark = 0;
  for (let i = 0; i < d.length; i += 4)
    if ((d[i] + d[i+1] + d[i+2]) / 3 < 200) dark++;
  return dark / (canvas.width * canvas.height) < 0.004;
}

// ── Preview ────────────────────────────────────────────────────────────────
function renderPreview(total) {
  const grid = document.getElementById('strip-grid');
  grid.innerHTML = '';
  document.getElementById('strip-title').textContent = `${total} tiras duplas geradas (prévia)`;
  document.getElementById('preview-strip').style.display = '';
  previewImages.slice(0, 12).forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'strip-item';
    const img = document.createElement('img'); img.src = src;
    const n   = document.createElement('div'); n.className = 'n'; n.textContent = `#${i+1}`;
    wrap.appendChild(img); wrap.appendChild(n);
    grid.appendChild(wrap);
  });
  if (total > 12) {
    const more = document.createElement('div');
    more.className = 'strip-item';
    more.style.cssText = 'display:grid;place-items:center;min-height:50px;font-size:12px;color:var(--muted)';
    more.textContent = `+${total - 12} mais`;
    grid.appendChild(more);
  }
}

// ── Download ───────────────────────────────────────────────────────────────
function download() {
  if (!resultDoc) return;
  resultDoc.save(`etiquetas_full_${previewImages.length}tiras.pdf`);
}

// ── Progress ───────────────────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-msg').textContent  = msg;
}
function setMsg(msg) { document.getElementById('prog-msg').textContent = msg; }

// ── Reset ──────────────────────────────────────────────────────────────────
function reset(full = true) {
  if (full) {
    pdfDoc = null;
    document.getElementById('file-input').value = '';
    document.getElementById('status-card').style.display  = 'none';
    document.getElementById('preview-strip').style.display = 'none';
  }
  resultDoc = null; previewImages = [];
  document.getElementById('btn-convert').disabled = true;
  document.getElementById('btn-dl').disabled      = true;
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-msg').textContent = '';
}
</script>
</body>
</html>
